name: CI (Rust)

on:
  push:
    branches: [rust-port]
  pull_request:
    branches: [rust-port]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test (default features)
        run: cargo test
  features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--no-default-features --features mcp"
          - "--no-default-features --features tui"
          - "--all-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test (${{ matrix.features }})
        run: cargo test -p pramana-cli ${{ matrix.features }}
