name: CI (Rust)

on:
  push:
    branches: [main, rust-port]
  pull_request:
    branches: [main, rust-port]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Check ratatui panic hook
        run: |
          failed=0
          while IFS= read -r f; do
            if ! grep -q 'panic::set_hook' "$f"; then
              echo "::error file=$f::$f calls ratatui::init() without a panic hook (panic::set_hook)"
              failed=1
            fi
          done < <(find . -name '*.rs' -exec grep -l 'ratatui::init()' {} + 2>/dev/null || true)
          if [ "$failed" -eq 1 ]; then
            echo "Fix: call std::panic::set_hook before ratatui::init() to restore the terminal on panic."
            exit 1
          fi
      - name: Test (default features)
        run: cargo test
  features:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--no-default-features --features mcp"
          - "--no-default-features --features tui"
          - "--all-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test (${{ matrix.features }})
        run: cargo test -p pramana-cli ${{ matrix.features }}
