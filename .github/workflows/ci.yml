name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
      - run: bun run typecheck

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test test/unit/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build binaries
        run: scripts/build.sh --all

      - name: Bundle plugin
        run: tar czf plugin.tar.gz -C plugin .

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" --clobber \
              pramana-darwin-arm64 \
              pramana-darwin-x64 \
              pramana-linux-x64 \
              pramana-linux-arm64 \
              pramana-windows-x64.exe \
              plugin.tar.gz
          else
            gh release create "$TAG" \
              --generate-notes \
              pramana-darwin-arm64 \
              pramana-darwin-x64 \
              pramana-linux-x64 \
              pramana-linux-arm64 \
              pramana-windows-x64.exe \
              plugin.tar.gz
          fi
