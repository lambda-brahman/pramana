name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test test/unit/ test/e2e/ test/precommit/
      - run: bun run typecheck

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test test/unit/

  test-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: ./pramana
          - os: windows-latest
            binary: ./pramana.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build binary
        run: scripts/build.sh
        shell: bash
      - name: Run smoke tests
        run: bun test test/smoke/
        env:
          PRAMANA_BIN: ${{ matrix.binary }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build macOS arm64 binary (native, no --target to avoid cross-compile mode)
        run: |
          scripts/build.sh
          mv pramana pramana-darwin-arm64
      - name: Build macOS x64 binary (cross-compile from arm64)
        run: scripts/build.sh --target bun-darwin-x64
      - name: Ad-hoc codesign
        run: |
          codesign --force --sign - pramana-darwin-arm64
          codesign --force --sign - pramana-darwin-x64
      - name: Verify signatures
        run: |
          codesign -dv pramana-darwin-arm64
          codesign -dv pramana-darwin-x64
          otool -l pramana-darwin-arm64 | grep LC_CODE_SIGNATURE
          otool -l pramana-darwin-x64 | grep LC_CODE_SIGNATURE
      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            pramana-darwin-arm64
            pramana-darwin-x64

  smoke-macos:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - uses: actions/download-artifact@v4
        with:
          name: macos-binaries
      - name: Verify signatures
        run: |
          codesign -dv pramana-darwin-arm64
          codesign -dv pramana-darwin-x64
      - name: Smoke test arm64 binary
        run: |
          chmod +x pramana-darwin-arm64
          bun test test/smoke/
        env:
          PRAMANA_BIN: ./pramana-darwin-arm64
      - name: Smoke test x64 binary
        run: |
          chmod +x pramana-darwin-x64
          bun test test/smoke/
        env:
          PRAMANA_BIN: ./pramana-darwin-x64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-windows, test-binary, build-macos, smoke-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries

      - name: Build Linux and Windows binaries
        run: |
          scripts/build.sh --target bun-linux-x64
          scripts/build.sh --target bun-linux-arm64
          scripts/build.sh --target bun-windows-x64

      - name: Bundle plugin
        run: tar czf plugin.tar.gz -C plugin .

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" --clobber \
              pramana-darwin-arm64 \
              pramana-darwin-x64 \
              pramana-linux-x64 \
              pramana-linux-arm64 \
              pramana-windows-x64.exe \
              plugin.tar.gz
          else
            gh release create "$TAG" \
              --generate-notes \
              pramana-darwin-arm64 \
              pramana-darwin-x64 \
              pramana-linux-x64 \
              pramana-linux-arm64 \
              pramana-windows-x64.exe \
              plugin.tar.gz
          fi
