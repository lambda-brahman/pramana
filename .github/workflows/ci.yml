name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
      - run: bun run typecheck

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test test/unit/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build binaries
        run: |
          bun build src/cli/index.ts --compile --target=bun-darwin-arm64 --outfile pramana-darwin-arm64
          bun build src/cli/index.ts --compile --target=bun-darwin-x64 --outfile pramana-darwin-x64
          bun build src/cli/index.ts --compile --target=bun-linux-x64 --outfile pramana-linux-x64
          bun build src/cli/index.ts --compile --target=bun-linux-arm64 --outfile pramana-linux-arm64
          bun build src/cli/index.ts --compile --target=bun-windows-x64 --outfile pramana-windows-x64.exe

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            pramana-darwin-arm64 \
            pramana-darwin-x64 \
            pramana-linux-x64 \
            pramana-linux-arm64 \
            pramana-windows-x64.exe
